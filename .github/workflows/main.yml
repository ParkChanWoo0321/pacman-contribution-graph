name: generate pacman game

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: create dark mode svg
        run: |
          cp dist/pacman-contribution-graph.svg dist/pacman-contribution-graph-dark.svg
          sed -i 's/#ffffff/#0d1117/g' dist/pacman-contribution-graph-dark.svg
          sed -i 's/#FFFFFF/#0d1117/g' dist/pacman-contribution-graph-dark.svg
          sed -i 's/white/#0d1117/g' dist/pacman-contribution-graph-dark.svg

      - name: push the content to a branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: dist
          publish_branch: output
          github_token: ${{ secrets.GITHUB_TOKEN }}
